name: teste de padronização de codigo - Lint
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
jobs:
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Instalar dependências
        run: npm ci
      - name: Executar lint
        run: npm run lint

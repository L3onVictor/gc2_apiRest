name: push test Node.js CI
on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: clonando repositório
      uses: actions/checkout@v6
    - name: versão do node
      uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: 'npm'
    - name: instalando dependências
      run: npm ci
    - name: Executando a aplicação
      run: |
        node index.js &
        sleep 5
        kill $!